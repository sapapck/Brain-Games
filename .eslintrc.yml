env:
  es2021: true
  node: true
extends: airbnb-base
overrides: []
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules:
  {
    "no-console": "off",
    "import/extensions": "off",
    "semi": ["error", "never"],
    "arrow-parens": ["error", "as-needed"],
    "eol-last": ["error", "always"]
  }
